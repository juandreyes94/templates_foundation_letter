steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/docx-generator:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/docx-generator:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'templateletter'
      - '--image=gcr.io/$PROJECT_ID/docx-generator:$COMMIT_SHA'
      - '--region=us-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'

images:
  - 'gcr.io/$PROJECT_ID/docx-generator:$COMMIT_SHA'